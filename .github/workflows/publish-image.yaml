name: Publish Production Docker Images to GHCR

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mother-api
            image: iron-burrow-mother-api-rs
            dockerfile: infra/docker/Dockerfile.mother-api
          - service: mother-api-db-migrate
            image: iron-burrow-mother-api-db-migrate
            dockerfile: infra/docker/Dockerfile.mother-api-db-migrate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          IMAGE: ${{ matrix.image }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          owner_lc="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          version="$REF_NAME"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Git tag must look like v0.3.1 or v0.3.1-rc.1, got: $version" >&2
            exit 1
          fi

          image_ref="${REGISTRY}/${owner_lc}/${IMAGE}"
          {
            echo "image_ref=${image_ref}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image_ref}:${version}"
            echo "${image_ref}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
