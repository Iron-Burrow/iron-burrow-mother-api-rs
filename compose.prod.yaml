services:
  caddy:
    image: caddy:2
    container_name: iron-burrow-caddy
    profiles: !reset []
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?CADDY_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - iron-burrow-public-net

  postgres:
    image: postgres:17-alpine
    container_name: ibdb-postgres
    ports: !reset []
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ibdb-postgres-data:/var/lib/postgresql/data
    networks:
      iron-burrow-net:
        aliases:
          - postgres
          - ibdb-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  iron-burrow-mother-api:
    build: !reset null
    image: ghcr.io/iron-burrow/iron-burrow-mother-api-rs:${IRON_BURROW_MOTHER_API_TAG:?IRON_BURROW_MOTHER_API_TAG is required}
    command: ["mother-api", "serve"]
    restart: unless-stopped
    ports: !reset []
    depends_on: !override
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      PUBLIC_API_SURFACE: ${PUBLIC_API_SURFACE:?PUBLIC_API_SURFACE is required}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PRICE_INDEXER_URL: ${PRICE_INDEXER_URL-}
      PRICE_QL_INTERNAL_TOKEN: ${PRICE_QL_INTERNAL_TOKEN:-}
      PRICE_INDEXER_TIMEOUT_MS: ${PRICE_INDEXER_TIMEOUT_MS:-2000}
      DIS_BASE_URL: ${DIS_BASE_URL:-}
      DIS_REQUEST_TIMEOUT_MS: ${DIS_REQUEST_TIMEOUT_MS:-5000}
      DIS_RETRY_MAX_ATTEMPTS: ${DIS_RETRY_MAX_ATTEMPTS:-2}
      INFRA_GATEWAY_URL: ${INFRA_GATEWAY_URL:-}
      INFRA_GATEWAY_TOKEN: ${INFRA_GATEWAY_TOKEN:-}
      BIGWIG_REQUEST_TIMEOUT_MS: ${BIGWIG_REQUEST_TIMEOUT_MS:-30000}
      BIGWIG_MAX_CONTRACT_ADDRESSES: ${BIGWIG_MAX_CONTRACT_ADDRESSES:-20}
      ERC20_TRANSFERS_ENABLED: ${ERC20_TRANSFERS_ENABLED:?ERC20_TRANSFERS_ENABLED is required}
      ERC20_TRANSFERS_MAX_TOKEN_FILTERS: ${ERC20_TRANSFERS_MAX_TOKEN_FILTERS:-20}
      RUST_LOG: ${RUST_LOG:-iron_burrow_mother_api_rs=info,tower_http=info}
    expose:
      - "3000"
    networks:
      iron-burrow-net:
        aliases:
          - mother-api
          - iron-burrow-mother-api
      iron-burrow-public-net:
        aliases:
          - mother-api
      infra-client: {}

  db-apply:
    build: !reset null
    image: ghcr.io/iron-burrow/iron-burrow-mother-api-rs:${IRON_BURROW_MOTHER_API_TAG:?IRON_BURROW_MOTHER_API_TAG is required}
    command: ["mother-api", "db", "apply"]
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks: !override
      - iron-burrow-net

networks:
  iron-burrow-net:
    external: true
    name: iron-burrow-net
  iron-burrow-public-net:
    external: true
    name: iron-burrow-public-net
  infra-client:
    external: true
    name: iron-burrow-infra-client-net
