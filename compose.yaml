name: iron-burrow-mother-api-rs

services:
  caddy:
    image: caddy:2
    container_name: iron-burrow-caddy
    profiles: ["app-dev"]
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - iron-burrow-public-net

  postgres:
    image: postgres:17-alpine
    container_name: ibdb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ibdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ibdb-postgres-data:/var/lib/postgresql/data
    networks:
      iron-burrow-net:
        aliases:
          - postgres
          - ibdb-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ibdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  iron-burrow-mother-api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mother-api
    container_name: iron-burrow-mother-api
    command: ["mother-api", "serve"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      PUBLIC_API_SURFACE: ${PUBLIC_API_SURFACE:-alpha}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ibdb}
      PRICE_INDEXER_URL: ${PRICE_INDEXER_URL-}
      PRICE_QL_INTERNAL_TOKEN: ${PRICE_QL_INTERNAL_TOKEN:-}
      PRICE_INDEXER_TIMEOUT_MS: ${PRICE_INDEXER_TIMEOUT_MS:-2000}
      DIS_BASE_URL: ${DIS_BASE_URL:-}
      DIS_REQUEST_TIMEOUT_MS: ${DIS_REQUEST_TIMEOUT_MS:-5000}
      DIS_RETRY_MAX_ATTEMPTS: ${DIS_RETRY_MAX_ATTEMPTS:-2}
      INFRA_GATEWAY_URL: ${INFRA_GATEWAY_URL:-}
      INFRA_GATEWAY_TOKEN: ${INFRA_GATEWAY_TOKEN:-}
      BIGWIG_REQUEST_TIMEOUT_MS: ${BIGWIG_REQUEST_TIMEOUT_MS:-30000}
      BIGWIG_MAX_CONTRACT_ADDRESSES: ${BIGWIG_MAX_CONTRACT_ADDRESSES:-20}
      ERC20_TRANSFERS_ENABLED: ${ERC20_TRANSFERS_ENABLED:-false}
      ERC20_TRANSFERS_MAX_TOKEN_FILTERS: ${ERC20_TRANSFERS_MAX_TOKEN_FILTERS:-20}
      RUST_LOG: ${RUST_LOG:-iron_burrow_mother_api_rs=info,tower_http=info}
    ports:
      - "${HOST_HTTP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      db-apply:
        condition: service_completed_successfully
    networks:
      iron-burrow-net:
        aliases:
          - mother-api
          - iron-burrow-mother-api
      iron-burrow-public-net:
        aliases:
          - mother-api
      infra-client: {}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  db-apply:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mother-api
    container_name: iron-burrow-mother-api-db-apply
    command: ["mother-api", "db", "apply"]
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ibdb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iron-burrow-net

networks:
  iron-burrow-net:
    name: iron-burrow-net
  iron-burrow-public-net:
    name: iron-burrow-public-net
  infra-client:
    name: iron-burrow-infra-client-net

volumes:
  ibdb-postgres-data:
    name: ibdb-postgres-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config
