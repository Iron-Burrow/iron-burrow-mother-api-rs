name: iron-burrow-mother-api-rs

services:
  postgres:
    image: postgres:17-alpine
    container_name: ibdb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ibdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ibdb-postgres-data:/var/lib/postgresql/data
    networks:
      iron-burrow-net:
        aliases:
          - postgres
          - ibdb-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ibdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  iron-burrow-mother-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iron-burrow-mother-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ibdb}
      RUST_LOG: ${RUST_LOG:-iron_burrow_mother_api_rs=info,tower_http=info}
    ports:
      - "${HOST_HTTP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      iron-burrow-net:
        aliases:
          - mother-api
          - iron-burrow-mother-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  iron-burrow-net:
    name: iron-burrow-net

volumes:
  ibdb-postgres-data:
    name: ibdb-postgres-data
